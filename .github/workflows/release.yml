name: Release

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "Initial release" > release-notes.md
          else
            {
              echo "## What's Changed"
              echo ""
              git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" --no-merges
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
            } > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md # avoids YAML special-char injection
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    name: Build & Release Linux (${{ matrix.platform }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false # publish successful targets even if one fails
      matrix:
        include:
          - platform: linux-amd64
            target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable with cross-compilation target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.91.1"
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install OpenSSL dev libraries (native build only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross (cross-compilation only)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        # Use crates.io release instead of git to avoid tag-rewrite supply chain risk
        run: cargo install cross --version 0.2.5 --locked

      - name: Build binaries (native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --bin code-review-cli --target ${{ matrix.target }}

      - name: Build binaries (cross)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        env:
          OPENSSL_VENDORED: "1"
          OPENSSL_STATIC: "1"
        run: cross build --release --bin code-review-cli --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/code-review-cli code-review-cli-${{ matrix.platform }}

      - name: Generate SHA-256 checksums
        run: |
          sha256sum code-review-cli-${{ matrix.platform }} > code-review-cli-${{ matrix.platform }}.sha256

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            code-review-cli-${{ matrix.platform }}
            code-review-cli-${{ matrix.platform }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    name: Build & Release macOS (${{ matrix.platform }})
    needs: create-release
    runs-on: macos-15 # pinned; macos-latest can jump major versions unexpectedly
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            target: aarch64-apple-darwin
          - platform: macos-amd64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable with target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.91.1"
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build binaries
        env:
          OPENSSL_VENDORED: "1"
        run: cargo build --release --bin code-review-cli --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/code-review-cli code-review-cli-${{ matrix.platform }}

      - name: Generate SHA-256 checksums
        run: |
          shasum -a 256 code-review-cli-${{ matrix.platform }} > code-review-cli-${{ matrix.platform }}.sha256

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            code-review-cli-${{ matrix.platform }}
            code-review-cli-${{ matrix.platform }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    name: Build & Release Windows
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.91.1"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build binaries
        # advapi32 is auto-linked by the Windows SDK; no RUSTFLAGS override needed
        run: cargo build --release --bin code-review-cli

      - name: Rename binaries and generate checksums
        shell: pwsh
        run: |
          Copy-Item target/release/code-review-cli.exe code-review-cli-windows-amd64.exe
          $hash = (Get-FileHash code-review-cli-windows-amd64.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  code-review-cli-windows-amd64.exe" | Out-File -Encoding ascii code-review-cli-windows-amd64.exe.sha256

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            code-review-cli-windows-amd64.exe
            code-review-cli-windows-amd64.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
