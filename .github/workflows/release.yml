name: Release

on:
  push:
    branches: [main]

jobs:
  release-linux:
    name: Build & Release Linux (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: linux-amd64
            target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with cross-compilation target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL dev libraries (native build only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross (cross-compilation only)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binaries (native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --bin code-review-cli --bin docgen --target ${{ matrix.target }}

      - name: Build binaries (cross)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        env:
          OPENSSL_VENDORED: "1"
        run: cross build --release --bin code-review-cli --bin docgen --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/code-review-cli code-review-cli-${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/docgen docgen-${{ matrix.platform }}

      - name: Publish to GitHub Releases (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: |
            code-review-cli-${{ matrix.platform }}
            docgen-${{ matrix.platform }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    name: Build & Release macOS (${{ matrix.platform }})
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: macos-arm64
            target: aarch64-apple-darwin
          - platform: macos-amd64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build docgen
        run: cargo build --release --bin docgen --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/docgen docgen-${{ matrix.platform }}

      - name: Publish to GitHub Releases (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: docgen-${{ matrix.platform }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    name: Build & Release Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build docgen
        run: cargo build --release --bin docgen

      - name: Rename binary
        run: cp target/release/docgen.exe docgen-windows-amd64.exe

      - name: Publish to GitHub Releases (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: docgen-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
