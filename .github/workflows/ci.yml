name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Deny all permissions by default; grant per-job only what's needed
permissions: read-all

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.91.0"
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy --workspace -- -D warnings

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet --locked
          cargo audit

      - name: Build workspace
        run: cargo build --workspace

      - name: Test workspace
        run: cargo test --workspace

  ai-code-review:
    name: AI Code Review
    runs-on: self-hosted
    needs: build-and-test
    # Only run on PRs from the same repo (not forks) and not from Dependabot
    # (Dependabot PRs don't receive repo secrets, so VLLM_URL is always empty there)
    if: >
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run AI Code Review
        uses: ./code-review
        with:
          vllm-url: ${{ secrets.VLLM_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
