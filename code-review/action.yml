name: AI Code Review
description: >
  Review a GitHub Pull Request using a self-hosted vLLM instance.
  Posts a structured Markdown comment directly on the PR.

inputs:
  vllm-url:
    description: "Base URL of the vLLM server (e.g. http://<your-host>:30000/v1)"
    required: true
  github-token:
    description: "GitHub token for fetching PR diff and posting the review comment"
    required: true
  vllm-model:
    description: "Override model ID. Auto-detected from /v1/models if empty."
    required: false
    default: ""
  vllm-timeout:
    description: "Total request timeout in seconds"
    required: false
    default: "120"
  vllm-retries:
    description: "Number of retries on LLM request failure"
    required: false
    default: "2"

runs:
  using: "composite"
  steps:
    - name: Download code-review-cli binary
      shell: bash
      run: |
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  ASSET="code-review-cli-linux-amd64" ;;
          aarch64) ASSET="code-review-cli-linux-arm64" ;;
          *)       echo "Unsupported architecture: $ARCH"; exit 1 ;;
        esac
        BASE_URL="https://github.com/WillIsback/code-review/releases/latest/download"
        curl -fsSL -o "${{ github.action_path }}/code-review-cli" "${BASE_URL}/${ASSET}"
        curl -fsSL -o "${{ github.action_path }}/code-review-cli.sha256" "${BASE_URL}/${ASSET}.sha256"
        # Verify checksum (cd into the dir so sha256sum resolves the filename correctly)
        sed -i "s|${ASSET}|code-review-cli|" "${{ github.action_path }}/code-review-cli.sha256"
        (cd "${{ github.action_path }}" && sha256sum --check "code-review-cli.sha256")
        chmod +x "${{ github.action_path }}/code-review-cli"

    - name: Run AI Code Review
      shell: bash
      env:
        GITHUB_TOKEN:        ${{ inputs.github-token }}
        VLLM_BASE_URL:       ${{ inputs.vllm-url }}
        VLLM_MODEL:          ${{ inputs.vllm-model }}
        VLLM_TIMEOUT:        ${{ inputs.vllm-timeout }}
        VLLM_RETRIES:        ${{ inputs.vllm-retries }}
        GITHUB_REPOSITORY:   ${{ github.repository }}
        PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
      run: ${{ github.action_path }}/code-review-cli
